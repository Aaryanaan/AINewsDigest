<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI News Digest{% endblock %}</title>
  <meta name="description" content="A personalized AI-powered daily news digest tailored to your interests." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #4f46e5;
      --brand-2: #7c3aed;
      --ink: #0f172a;
      --muted: #64748b;
      --bg: #f6f7fb;
    }
    html, body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--ink); }
    .brand-bar {
      background: linear-gradient(90deg, var(--brand) 0%, var(--brand-2) 100%);
      box-shadow: 0 2px 12px rgba(79, 70, 229, 0.18);
    }
    .brand-bar .navbar-brand { color: #fff !important; font-weight: 800; letter-spacing: -0.5px; }
    .brand-bar .navbar-brand small { font-weight: 400; opacity: 0.85; }
    .brand-bar .btn-outline-light { border-color: rgba(255,255,255,0.5); }
    .brand-bar .form-select { border: none; }
    .score-badge { font-size: 0.72rem; }
    .article-card {
      transition: transform 0.12s ease, box-shadow 0.15s ease;
      border: 1px solid #eceef3;
      border-radius: 14px;
    }
    .article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    .source-tag { font-size: 0.75rem; }
    .digest-header {
      border-left: 4px solid var(--brand);
      padding-left: 1rem;
    }
    .hero {
      background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 100%);
      border-radius: 20px;
      padding: 3rem 2rem;
      margin-bottom: 2rem;
    }
    .hero h1 { font-weight: 800; letter-spacing: -1px; }
    .value-prop {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem;
      height: 100%;
      border: 1px solid #eceef3;
    }
    .value-prop .icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; margin-bottom: 0.75rem;
    }
    .profile-card {
      border-radius: 14px; border: 1px solid #eceef3;
      transition: all 0.15s ease; background: #fff;
    }
    .profile-card:hover {
      border-color: var(--brand);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.12);
    }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.1rem;
    }
    .interest-chip {
      display: inline-block; font-size: 0.72rem;
      background: #eef2ff; color: var(--brand);
      padding: 2px 8px; border-radius: 999px; margin-right: 4px;
    }
    .match-meter {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.75rem; color: var(--muted);
    }
    .match-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0;
    }
    .match-dot.on { background: var(--brand); }
    footer {
      border-top: 1px solid #e5e7eb;
      padding: 2rem 0; margin-top: 4rem;
      color: var(--muted); font-size: 0.875rem;
      background: #fff;
    }
    a { color: var(--brand); }
    a:hover { color: var(--brand-2); }
    .text-muted-soft { color: #94a3b8; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg brand-bar mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">
        AI News Digest <small class="d-none d-md-inline">· personalized reading</small>
      </a>
      <div class="d-flex gap-2 align-items-center">
        {% if all_users is defined and all_users|length > 1 %}
        <select class="form-select form-select-sm" style="width:auto"
                onchange="window.location='/digest/'+this.value">
          <option disabled selected>Switch profile</option>
          {% for u in all_users %}
          <option value="{{ u.user_id }}"
            {% if current_user_id is defined and u.user_id == current_user_id %}selected{% endif %}>
            {{ u.display_name or u.email }}
          </option>
          {% endfor %}
        </select>
        {% endif %}
        <a class="btn btn-outline-light btn-sm" href="/articles">Browse all</a>
        <a class="btn btn-outline-light btn-sm d-none d-md-inline" href="/about">About</a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
      <div>
        <strong>AI News Digest</strong> · curated for you
        {% if last_updated %}
        <span class="text-muted-soft">· last updated {{ last_updated[:10] }}</span>
        {% endif %}
      </div>
      <div>
        <a href="/about" class="text-decoration-none me-3">About</a>
        <a href="/articles" class="text-decoration-none">All articles</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
