<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI News Digest{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .score-badge { font-size: 0.75rem; }
    .article-card { transition: box-shadow 0.15s; }
    .article-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .source-tag { font-size: 0.78rem; }
    .digest-header { border-left: 4px solid #0d6efd; padding-left: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">AI News Digest</a>
      <div class="d-flex gap-2">
        {% if all_users is defined and all_users|length > 1 %}
        <select class="form-select form-select-sm" style="width:auto"
                onchange="window.location='/digest/'+this.value">
          <option disabled selected>Switch user</option>
          {% for u in all_users %}
          <option value="{{ u.user_id }}"
            {% if current_user_id is defined and u.user_id == current_user_id %}selected{% endif %}>
            {{ u.display_name or u.email }}
          </option>
          {% endfor %}
        </select>
        {% endif %}
        <a class="btn btn-outline-light btn-sm" href="/articles">All Articles</a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
